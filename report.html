<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loading report...</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0A0E1A; color:#f0f1f3; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    #loading { display:flex; align-items:center; justify-content:center; height:100vh; flex-direction:column; gap:16px; }
    #loading p { color:#8b92a0; font-size:14px; }
    .spinner { width:32px; height:32px; border:3px solid #243049; border-top-color:#60a5fa; border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #error { display:none; text-align:center; padding:80px 24px; }
    #error h1 { color:#fff; font-size:22px; margin-bottom:8px; }
    #error p { color:#8b92a0; font-size:14px; }
  </style>
  <!-- Web override: strip iPhone frame, show all pages stacked -->
  <style id="web-override">
    .iphone-frame { width:100%!important; max-width:800px!important; margin:0 auto!important; height:auto!important; border-radius:0!important; padding:0!important; box-shadow:none!important; background:transparent!important; }
    .iphone-notch { display:none!important; }
    .iphone-screen { border-radius:0!important; height:auto!important; overflow:visible!important; }
    .page { display:flex!important; padding:40px 32px!important; border-bottom:1px solid rgba(255,255,255,0.06); }
    .page:last-of-type { border-bottom:none; }
    .page-indicator { display:none!important; }
    .navigation { display:none!important; }
    @media(min-width:600px) {
      .metrics-grid { grid-template-columns:repeat(4,1fr)!important; }
      .fundamentals-grid { grid-template-columns:repeat(2,1fr)!important; }
    }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><p>Loading report...</p></div>
  <div id="error"><h1>Report not found</h1><p>The requested report does not exist or has expired.</p></div>
  <div id="report" style="display:none"></div>

  <script>
    (async function() {
      const SUPABASE_URL = 'https://jqzlwrvppcfomtlzvioe.supabase.co';
      const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impxemx3cnZwcGNmb210bHp2aW9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg3NjQ3OTcsImV4cCI6MjA3NDM0MDc5N30.2Ct7RSgLBGLUYZctLeNnccdQd2NXA6mANGCTf57kGeY';

      const params = new URLSearchParams(window.location.search);
      const reportId = params.get('id');

      if (!reportId) { showError(); return; }

      try {
        // Fetch HTML content from portfolio_impact_html table
        const resp = await fetch(
          SUPABASE_URL + '/rest/v1/portfolio_impact_html?select=html_content&id=eq.' + reportId + '&limit=1',
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
        );

        if (!resp.ok) { showError(); return; }

        const data = await resp.json();
        if (!data || !data.length || !data[0].html_content) { showError(); return; }

        var html = data[0].html_content;

        // Extract content between <body> and </body>
        var bodyMatch = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
        if (!bodyMatch) { showError(); return; }

        // Extract and inject <style> blocks from <head>
        var styleBlocks = '';
        var styleRegex = /<style[^>]*>([\s\S]*?)<\/style>/gi;
        var match;
        while ((match = styleRegex.exec(html)) !== null) {
          // Skip our own web-override style
          if (match[0].indexOf('web-override') === -1) {
            styleBlocks += match[0];
          }
        }

        // Extract title
        var titleMatch = html.match(/<title>([^<]+)<\/title>/);
        if (titleMatch) { document.title = titleMatch[1] + ' -- Chicago Global'; }

        // Build header + content + footer
        var titleParts = (titleMatch ? titleMatch[1] : '').split(' - ');
        var ticker = titleParts[0] || '';
        var subtitle = titleParts[1] || 'Portfolio Impact Analysis';

        var header = '<div style="background:#0d1117;padding:24px 32px;text-align:center;border-bottom:1px solid #243049;max-width:800px;margin:0 auto">'
          + '<h1 style="color:#fff;font-size:24px;font-weight:700;margin:0;letter-spacing:.5px">Chicago Global</h1>'
          + '<p style="color:#8b92a0;font-size:13px;margin:8px 0 0">' + ticker + ' -- ' + subtitle + '</p>'
          + '</div>';

        var footer = '<div style="background:#0d1117;padding:20px 32px;text-align:center;border-top:1px solid #243049;max-width:800px;margin:0 auto;color:#8b92a0;font-size:12px">'
          + 'Chicago Global -- Portfolio Impact Analysis<br>Generated by Parallax AI</div>';

        // Inject styles and content
        document.getElementById('loading').style.display = 'none';
        var reportEl = document.getElementById('report');
        reportEl.innerHTML = styleBlocks + header + bodyMatch[1] + footer;
        reportEl.style.display = 'block';

      } catch(e) {
        console.error(e);
        showError();
      }

      function showError() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
      }
    })();
  </script>
</body>
</html>
